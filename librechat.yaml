# ============================================================================
# LibreChat Configuration — Agent Platform
# ============================================================================

version: 1.3.13

cache: true

interface:
  customWelcome: 'مرحباً! أنا وكيلك الذكي. اختر مهمة أو اكتب طلبك.'
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  obliterate: true

registration:
  socialLogins: []
  allowedDomains: []

fileStrategy: local

endpoints:
  custom:
    # ── OpenCodez Provider (OpenAI-compatible) ──────────────────────────
    # OpenCodez works WITHOUT an API key — sending any key causes 401.
    # Setting apiKey to empty string prevents the Authorization header.
    - name: 'OpenCodez'
      apiKey: ''
      baseURL: 'https://opencode.ai/zen/v1'
      models:
        default:
          - 'deepseek-v4-flash-free'
          - 'mimo-v2.5-free'
          - 'qwen3.6-plus-free'
          - 'minimax-m3-free'
          - 'nemotron-3-ultra-free'
          - 'north-mini-code-free'
        fetch: true
      titleConvo: true
      titleMethod: 'completion'
      titleModel: 'deepseek-v4-flash-free'
      summarize: false
      summaryModel: 'deepseek-v4-flash-free'
      forcePrompt: false
      modelDisplayLabel: 'OpenCodez'
      addParams:
        stream: true
