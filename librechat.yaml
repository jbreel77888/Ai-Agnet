# ============================================================================
# LibreChat Configuration — Agent Platform (Multi-Agent)
# ============================================================================

version: 1.3.13

cache: true

interface:
  customWelcome: 'مرحباً! أنا وكيلك الذكي. اكتب طلبك وسأساعدك.'
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: false
  prompts: true
  bookmarks: true
  multiConvo: true
  obliterate: true

registration:
  socialLogins: []
  allowedDomains: []

fileStrategy: local

endpoints:
  agents:
    disableBuilder: false
    recursionLimit: 50
    capabilities:
      - tools
      - file_search
      - artifacts
      - context

  custom:
    - name: 'OpenCodez'
      apiKey: 'no-key-needed'
      baseURL: 'http://localhost:3080/api/opencodez/v1'
      models:
        default:
          - 'deepseek-v4-flash-free'
          - 'mimo-v2.5-free'
          - 'nemotron-3-ultra-free'
          - 'north-mini-code-free'
        fetch: false
      titleConvo: true
      titleMethod: 'completion'
      titleModel: 'deepseek-v4-flash-free'
      summarize: false
      summaryModel: 'deepseek-v4-flash-free'
      forcePrompt: false
      modelDisplayLabel: 'OpenCodez'
      addParams:
        stream: true
      dropParams:
        - temperature
        - top_p
