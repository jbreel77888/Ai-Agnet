# ============================================================================
# Ai Norx — Configuration
# ============================================================================

version: 1.3.13

cache: true

interface:
  customWelcome: 'مرحباً بك في Ai Norx — اكتب طلبك وسأختار الأدوات المناسبة تلقائياً'
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: false
  prompts: true
  bookmarks: true
  multiConvo: true
  obliterate: true

registration:
  socialLogins: []
  allowedDomains: []

fileStrategy: local

# Web Search Configuration (used by the `web_search` capability/tool)
# This is the proper way to enable web search — Tavily as both the
# search provider AND the content scraper. The `web_search` tool
# (loaded from Tools.web_search) uses this config to construct a
# structured search tool with reranking, scraping, and highlights.
# Do NOT add `tavily_search_results_json` directly to an agent's
# tools list — that's a raw fallback that returns JSON to the LLM
# and tends to fire on every message.
webSearch:
  searchProvider: tavily
  scraperProvider: tavily
  tavilyApiKey: '${TAVILY_API_KEY}'
  tavilySearchOptions:
    searchDepth: basic
    maxResults: 5
    topic: general
  # Reranker: disabled ('none') — Jina's free tier rate-limits too
  # aggressively (429 errors on every search). Tavily's default
  # ranking is already good enough for most queries.
  # To re-enable Jina reranking later, set:
  #   rerankerType: jina
  #   jinaApiKey: '${JINA_API_KEY}'
  rerankerType: none

# ============================================================================
# MCP Servers — Model Context Protocol
# ============================================================================
# These extend the agent with structured tools for filesystem operations,
# URL fetching, and GitHub API access. Each server runs as a subprocess
# (stdio type) via npx, downloading the package on first use.
#
# Tool naming in LibreChat:
#   sys__all__sys_mcp_<serverName>  →  all tools from this server
#   <toolName>_mcp_<serverName>    →  one specific tool
#
# The agent_primary has these servers enabled via:
#   sys__all__sys_mcp_github
#   sys__all__sys_mcp_fetch
#   sys__all__sys_mcp_filesystem
mcpServers:
  # GitHub MCP Server — repo management, PRs, issues, file contents
  # Uses GITHUB_PERSONAL_ACCESS_TOKEN env var (set on Railway)
  github:
    type: stdio
    command: npx
    args:
      - -y
      - '@modelcontextprotocol/server-github'
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: '${GITHUB_PERSONAL_ACCESS_TOKEN}'
    timeout: 60000

  # Fetch MCP Server — fetches URLs and converts to markdown
  # Useful for reading web pages, API docs, etc.
  # No auth required — just HTTP fetch
  fetch:
    type: stdio
    command: npx
    args:
      - -y
      - '@modelcontextprotocol/server-fetch'
    timeout: 30000

  # Filesystem MCP Server — read/write/list files in the agent workspace
  # Exposes /app/uploads/agent-workspace/ (created in Dockerfile)
  # This is persistent storage across conversations — unlike Tensorlake
  # sandbox which is per-conversation. Use for reports, generated files,
  # intermediate results that should survive across sessions.
  filesystem:
    type: stdio
    command: npx
    args:
      - -y
      - '@modelcontextprotocol/server-filesystem'
      - /app/uploads/agent-workspace
    timeout: 30000

endpoints:
  agents:
    disableBuilder: false
    recursionLimit: 50
    capabilities:
      - tools
      - web_search
      - file_search
      - artifacts
      - context

  custom:
    - name: 'OpenCodez'
      apiKey: 'no-key-needed'
      baseURL: 'http://localhost:3080/api/opencodez/v1'
      models:
        default:
          - 'deepseek-v4-flash-free'
          - 'mimo-v2.5-free'
          - 'nemotron-3-ultra-free'
          - 'north-mini-code-free'
        fetch: false
      titleConvo: true
      titleMethod: 'completion'
      titleModel: 'deepseek-v4-flash-free'
      summarize: false
      summaryModel: 'deepseek-v4-flash-free'
      forcePrompt: false
      modelDisplayLabel: 'OpenCodez'
      addParams:
        stream: true
      dropParams:
        - temperature
        - top_p
