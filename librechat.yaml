# ============================================================================
# LibreChat Configuration — Universal Agent Platform
# ============================================================================

version: 1.3.13

cache: true

interface:
  customWelcome: 'مرحباً! أنا وكيلك الذكي. اكتب طلبك وسأختار الأدوات المناسبة تلقائياً.'
  endpointsMenu: false
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: false
  prompts: true
  bookmarks: true
  multiConvo: true
  obliterate: true

registration:
  socialLogins: []
  allowedDomains: []

fileStrategy: local

endpoints:
  custom:
    - name: 'OpenCodez'
      apiKey: 'no-key-needed'
      baseURL: 'http://localhost:3080/api/opencodez/v1'
      models:
        default:
          - 'deepseek-v4-flash-free'
          - 'mimo-v2.5-free'
          - 'qwen3.6-plus-free'
          - 'minimax-m3-free'
          - 'nemotron-3-ultra-free'
          - 'north-mini-code-free'
        fetch: false
      titleConvo: true
      titleMethod: 'completion'
      titleModel: 'deepseek-v4-flash-free'
      summarize: false
      summaryModel: 'deepseek-v4-flash-free'
      forcePrompt: false
      modelDisplayLabel: 'OpenCodez'
      addParams:
        stream: true
      dropParams:
        - 'temperature'
        - 'top_p'
