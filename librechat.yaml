# ============================================================================
# LibreChat Configuration — Agent Platform
# ============================================================================
# OpenCodez doesn't require any API key — sending one causes 401 errors.
# We set apiKey to empty string to prevent sending Authorization header.
# ============================================================================

version: 1.3.13

cache: true

interface:
  customWelcome: 'مرحباً! أنا وكيلك الذكي. اختر مهمة أو اكتب طلبك.'
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  obliterate: true

registration:
  socialLogins: []
  allowedDomains: []

fileStrategy: local

endpoints:
  custom:
    - name: 'OpenCodez'
      apiKey: 'no-key-required'
      baseURL: 'https://opencode.ai/zen/v1'
      models:
        default:
          - 'deepseek-v4-flash-free'
          - 'mimo-v2.5-free'
          - 'qwen3.6-plus-free'
          - 'minimax-m3-free'
          - 'nemotron-3-ultra-free'
          - 'north-mini-code-free'
        fetch: true
      titleConvo: true
      titleMethod: 'completion'
      titleModel: 'deepseek-v4-flash-free'
      summarize: false
      summaryModel: 'deepseek-v4-flash-free'
      forcePrompt: false
      modelDisplayLabel: 'OpenCodez'
      # Override Authorization header with empty value
      # OpenCodez rejects any Bearer token
      headers:
        Authorization: ''
        Content-Type: 'application/json'
      addParams:
        stream: true
      dropParams:
        - 'temperature'
        - 'top_p'
