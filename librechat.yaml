# ============================================================================
# LibreChat Configuration — Universal Agent (Manus-style)
# ============================================================================
# Single Universal Agent. User just opens chat and types.
# No agent picker, no endpoint menu — like Manus AI.
# ============================================================================

version: 1.3.13

cache: true

interface:
  customWelcome: 'مرحباً! كيف يمكنني مساعدتك اليوم؟'
  endpointsMenu: false
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: false
  prompts: false
  bookmarks: true
  multiConvo: true
  obliterate: true

registration:
  socialLogins: []
  allowedDomains: []

fileStrategy: local

endpoints:
  # Disable agent builder — users cannot create custom agents
  agents:
    disableBuilder: true
    recursionLimit: 50
    capabilities:
      - 'tools'
      - 'code_interpreter'
      - 'file_search'
      - 'image_vision'

  custom:
    - name: 'OpenCodez'
      apiKey: 'no-key-needed'
      baseURL: 'http://localhost:3080/api/opencodez/v1'
      models:
        default:
          - 'deepseek-v4-flash-free'
          - 'mimo-v2.5-free'
          - 'qwen3.6-plus-free'
          - 'minimax-m3-free'
          - 'nemotron-3-ultra-free'
          - 'north-mini-code-free'
        fetch: false
      titleConvo: true
      titleMethod: 'completion'
      titleModel: 'deepseek-v4-flash-free'
      summarize: false
      summaryModel: 'deepseek-v4-flash-free'
      forcePrompt: false
      modelDisplayLabel: 'OpenCodez'
      addParams:
        stream: true
      dropParams:
        - 'temperature'
        - 'top_p'
